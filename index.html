<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --text-color: #333;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        h1 { margin: 10px 0 5px; font-size: 24px; color: var(--primary-color); }
        p { margin: 0 0 20px; color: #666; font-size: 16px; }
        
        .btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.98); background: #2980b9; }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .social-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">JD</div>
        
        <h1>Your Name</h1>
        <p>Title / Business Name</p>

        <a href="https://your-link-to-file.vcf" class="btn">
            📥 Save Contact
        </a>

        <div class="social-links">
            <a href="tel:+639000000000">Call</a>
            <a href="mailto:your@email.com">Email</a>
        </div>
    </div>

</body>
</html>
